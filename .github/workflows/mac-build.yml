name: mac-build

on:
  # Auto-triggers disabled — only the Windows CUDA build runs automatically.
  # Run manually from the Actions tab if needed.
  workflow_dispatch:

jobs:
  build:
    name: macOS CPU
    runs-on: macos-14

    env:
      BUILD_DIR: build/ci-macos-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check loader/catalog sync
        run: |
          python3 tools/check_loader_catalog_sync.py --self-test
          python3 tools/check_loader_catalog_sync.py

      - name: Configure
        run: |
          cmake -S . -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENGINE_ENABLE_CUDA=OFF \
            -DENGINE_ENABLE_VULKAN=OFF \
            -DENGINE_ENABLE_METAL=OFF \
            -DENGINE_ENABLE_OPENMP=OFF \
            -DGGML_OPENMP=OFF

      - name: Build
        run: |
          cmake --build "$BUILD_DIR" \
            --parallel "$(sysctl -n hw.logicalcpu)" \
            --target audiocpp_cli audiocpp_server audiocpp_gguf
