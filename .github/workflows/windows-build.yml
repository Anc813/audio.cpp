name: windows-build

on:
  # Auto-triggers disabled — only the Windows CUDA build runs automatically.
  # Run manually from the Actions tab if needed.
  workflow_dispatch:

jobs:
  build:
    name: Windows CPU
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check loader/catalog sync
        shell: pwsh
        run: |
          python tools/check_loader_catalog_sync.py --self-test
          python tools/check_loader_catalog_sync.py

      - name: Build audiocpp_cli
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 `
            -Preset windows-cpu-release `
            -Target audiocpp_cli

      - name: Build audiocpp_server
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 `
            -Preset windows-cpu-release `
            -Target audiocpp_server

      - name: Build audiocpp_gguf
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 `
            -Preset windows-cpu-release `
            -Target audiocpp_gguf
